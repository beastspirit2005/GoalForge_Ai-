services:
  # PostgreSQL Container Setup (16 Alpine)
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: goalforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  # Redis rate limiting database
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # FastAPI Python Backend Container
  backend:
    image: goalforge-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/goalforge
      SECRET_KEY: ${SECRET_KEY:-goalforge-super-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      REDIS_URL: redis://redis:6379
      DEBUG: "True"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - ollama
      - redis

  # Next.js Frontend Container
  frontend:
    image: goalforge-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # SSR fetches; rewrites are set at image build via API_PROXY_TARGET ARG.
      API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

  # Local Ollama AI Container
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama

  # Helper service to automatically pre-pull lightweight model
  ollama-pull-model:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Waiting for Ollama server to boot...';
      until curl -s http://ollama:11434/api/tags >/dev/null; do
        sleep 2;
      done;
      echo 'Pulling gemma2:2b model (lightweight & highly capable)...';
      ollama pull gemma2:2b;
      echo 'gemma2:2b model pulled successfully!';
      "
    depends_on:
      - ollama

volumes:
  pgdata:
  ollama:
